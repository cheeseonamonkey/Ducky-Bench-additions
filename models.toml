# Pick models by changing enabled = false to true. That is all you normally
# need to edit. Every named model starts off, so a run never surprises you.
#
# This benchmark gives every model a reference image. The runner checks
# OpenRouter's live catalog before sending a request and skips text-only,
# retired, and otherwise incompatible entries without charging for a failed try.

[run]
endpoint = "https://openrouter.ai/api/v1/chat/completions"
api_key_env = "OPENROUTER_API_KEY"
timeout_seconds = 180
retry_attempts = 2
image_detail = "high"

# A safety ceiling for paid choices. OpenRouter reports the actual cost after
# each request; set this to 0 to turn the ceiling off.
max_total_cost_usd = 5.00
request = { temperature = 0.15, max_tokens = 6000 }

[benchmark]
vote_page = "https://ducky-bench.joinity.site/index.php"
test_ids = [1, 2, 3]
prompt = """
Recreate the supplied reference image as a standalone SVG vector illustration.
Match its composition, silhouette, palette, major details, and visual style as
closely as possible. Use only native SVG shapes, paths, fills, and strokes.
Do not use <image>, foreignObject, raster embeds, external assets, base64 data,
or text labels. Return only complete, valid SVG markup—no Markdown or prose.
"""

# "All free" makes sense only for models that can see the reference image.
# This automatically adds every current, free image-to-text OpenRouter model
# when you run. It skips Gemma and Venice as requested, plus specialist models
# that are not general SVG generators. Set enabled = false if you want to run
# only the manual picks below.
[free_vision]
enabled = true
exclude_model_prefixes = ["google/gemma-", "venice/", "openrouter/"]
exclude_model_substrings = ["content-safety", "embed", "rerank", "guard"]

